<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dear Myself</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand+SC&display=swap" rel="stylesheet">

</head>
<body class="bg-[#FFD8BE] h-screen w-full flex flex-col items-center justify-center gap-4">

<div id="mainContent" class="flex flex-col items-center justify-center gap-4">
<h1 class="font-['Patrick_Hand_SC'] text-8xl text-[#9381FF] [text-shadow:2px_2px_0_#B8B8FF]">Dear Myself</h1>
<h4 class="font-['Patrick_Hand_SC'] text-3xl text-[#9381FF] [text-shadow:1.5px_1.5px_0_#B8B8FF]"> Your Daily Reflections</h4>

<button id="startBtn" class="w-40 h-12 cursor-pointer rounded-3xl border-2 border-[#9381FF] shadow-[inset_0px_-2px_0px_1px_#9381FF] group hover:bg-[#9381FF] transition duration-300 ease-in-out mt-6 animate-bounce">
<span class="font-['Patrick_Hand_SC'] font-semibold text-xl text-[#9381FF] group-hover:text-[#FFD8BE]">Dear Me</span>
</button>
</div>

<div id="loader" class="w-full gap-x-2 flex justify-center items-center" style="display: none;">
<div class="w-5 bg-[#d991c2] h-5 rounded-full animate-bounce"></div>
<div class="w-5 h-5 bg-[#9869b8] rounded-full animate-bounce"></div>
<div class="w-5 h-5 bg-[#6756cc] rounded-full animate-bounce"></div>
</div>

<script src="index.js"></script>

</body>
</html>
